general {
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    # This is the key line:
    # take a screenshot of the current desktop when locking
    path = screenshot

    # Apply blur to that screenshot
    blur_passes = 3       # >0 enables blur
    blur_size   = 7

    # Slight dim, not black
    color = rgba(0, 0, 0, 1.0)
    brightness = 0.9
    noise = 0.0
}

input-field {
    monitor =
    size = 240, 60
    outline_thickness = 2
    font_size = 16
    dots_center = true

    no_fade_in = true
    fade_on_empty = false
}

label {
    monitor =
    text = "Enter your password to unlock"
    font_size = 20
    position = 0, 150
    color = rgba(255, 255, 255, 0.9)
    shadow_passes = 1
}

# TIME — updates every second — positioned at ~92% x, ~88% y of the output
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M:%S"
    font_size = 23
    color = rgba(255,255,255,0.95)
    zindex = 5

    # Use percent position so it's relative to the output size (reliable)
    # x = 92% from left (i.e. near right edge), y = 88% from top (i.e. near bottom)
    position = 85%, 88%

    # Do not rely on halign/valign — place by absolute percent instead
    halign = none
    valign = none
}

# DATE — updates every minute — placed a bit below the time
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 18
    color = rgba(255,255,255,0.85)
    zindex = 5

    # Slightly lower than time. Adjust the percents if you want it closer/farther.
    position = 80%, 93%

    halign = none
    valign = none
}

